name: Deploy to Wasmer Edge

on:
  push:
    branches:
      - main # Triggers compilation & deployment on changes to main branch

jobs:
  deploy:
    name: Build & Publish App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies & Build Client Assets
        run: |
          npm ci
          npm run build

      - name: Publish to Wasmer Edge Registry
        uses: wasmer/deploy-action@v1
        with:
          registry-token: ${{ secrets.WASMER_TOKEN }}
